<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      padding: 48px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .avatar {
      width: 72px;
      height: 72px;
      background: #4f46e5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
      color: white;
      font-weight: 700;
    }

    h1 {
      font-size: 26px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #888;
      margin-bottom: 32px;
    }

    .info-box {
      background: #f0f0ff;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 32px;
      text-align: left;
    }

    .info-box p {
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    .info-box p:last-child { margin-bottom: 0; }

    .info-box span {
      font-weight: 600;
      color: #1a1a2e;
    }

    .badge {
      display: inline-block;
      background: #d4edda;
      color: #1a6b3c;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #f5f5f5;
      color: #555;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: #fdecea;
      color: #b91c1c;
      border-color: #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar" id="avatar">?</div>

    <h1 id="welcome">Bem-vindo!</h1>
    <p class="subtitle">Você está logado com sucesso.</p>

    <div class="info-box">
      <p>Nome: <span id="userName">—</span></p>
      <p>E-mail: <span id="userEmail">—</span></p>
      <p>Status: <span class="badge">✅ Confirmado</span></p>
    </div>

    <button onclick="logout()">Sair da conta</button>
  </div>

  <script>
    // Recupera o usuário salvo no login
    const user = JSON.parse(localStorage.getItem('user'))

    // Se não estiver logado, redireciona para o login
    if (!user) {
      window.location.href = '/login.html'
    } else {
      document.getElementById('welcome').textContent = `Olá, ${user.name}! 👋`
      document.getElementById('userName').textContent = user.name
      document.getElementById('userEmail').textContent = user.email

      // Inicial do nome no avatar
      document.getElementById('avatar').textContent = user.name.charAt(0).toUpperCase()
    }

    function logout() {
      localStorage.removeItem('user')
      window.location.href = '/login.html'
    }
  </script>
</body>
</html>
