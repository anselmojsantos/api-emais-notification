<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 18px;
      transition: border 0.2s;
      outline: none;
    }

    input:focus { border-color: #4f46e5; }

    button.btn-submit {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.btn-submit:hover { background: #3730a3; }

    .msg {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .msg.error { background: #fdecea; color: #b91c1c; display: block; }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }

    .login-link a { color: #4f46e5; text-decoration: none; font-weight: 500; }
    .login-link a:hover { text-decoration: underline; }

    /* ── Modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      transform: translateY(20px);
      transition: transform 0.3s;
    }

    .overlay.show .modal {
      transform: translateY(0);
    }

    .modal .icon {
      font-size: 52px;
      margin-bottom: 16px;
    }

    .modal h2 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 10px;
    }

    .modal p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal p span {
      font-weight: 600;
      color: #4f46e5;
    }

    .modal button {
      padding: 12px 32px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal button:hover { background: #3730a3; }
  </style>
</head>
<body>

  <!-- Modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="icon">🎉</div>
      <h2>Cadastro realizado!</h2>
      <p>Um e-mail foi enviado para <span id="modalEmail"></span>.<br/>Confirme para acessar o app.</p>
      <button onclick="goToLogin()">Ir para o Login</button>
    </div>
  </div>

  <div class="card">
    <h1>Criar conta</h1>
    <p class="subtitle">Preencha os dados para se cadastrar</p>

    <label>Nome</label>
    <input type="text" id="name" placeholder="Seu nome completo" />

    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" />

    <label>Senha</label>
    <input type="password" id="password" placeholder="Mínimo 6 caracteres" />

    <label>Confirmar senha</label>
    <input type="password" id="confirmPassword" placeholder="Repita a senha" />

    <button class="btn-submit" onclick="register()">Cadastrar</button>

    <div class="msg" id="msg"></div>

    <div class="login-link">
      Já tem conta? <a href="/login.html">Entrar</a>
    </div>
  </div>

  <script>
    async function register() {
      const name = document.getElementById('name').value.trim()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const confirmPassword = document.getElementById('confirmPassword').value
      const msg = document.getElementById('msg')

      msg.className = 'msg'
      msg.textContent = ''

      if (!name || !email || !password || !confirmPassword) {
        msg.className = 'msg error'
        msg.textContent = 'Preencha todos os campos.'
        return
      }

      if (password.length < 6) {
        msg.className = 'msg error'
        msg.textContent = 'A senha deve ter pelo menos 6 caracteres.'
        return
      }

      if (password !== confirmPassword) {
        msg.className = 'msg error'
        msg.textContent = 'As senhas não coincidem.'
        return
      }

      try {
        const res = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        })

        const data = await res.json()

        if (res.ok) {
          // Mostra o modal com o e-mail cadastrado
          document.getElementById('modalEmail').textContent = email
          document.getElementById('overlay').classList.add('show')
        } else {
          msg.className = 'msg error'
          msg.textContent = data.error || 'Erro ao cadastrar.'
        }
      } catch (e) {
        msg.className = 'msg error'
        msg.textContent = 'Erro de conexão com o servidor.'
      }
    }

    function goToLogin() {
      window.location.href = '/login.html'
    }
  </script>
</body>
</html>
